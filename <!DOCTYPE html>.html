<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAQI Gulf – Premium Building Materials & Furniture Supply</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root { --gold: #C5A059; --ink: #1a1a1a; --cream: #f9f9f9; }
        body { margin: 0; font-family: Arial, sans-serif; background: #fff; overflow-x: hidden; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        
        /* 社交图标黑金升级 */
        #side-rail a { 
            background: rgba(20, 20, 20, 0.85) !important; 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(197,160,89,0.3) !important;
            color: #C5A059 !important; padding: 12px; display: block; margin-bottom: 5px;
        }

        /* 手机端视频 16:9 修复 */
        @media (max-width: 768px) {
            #hero { height: auto !important; aspect-ratio: 16/9 !important; width: 100vw !important; position: relative; }
            #hero video { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover !important; }
            .contact-item { flex-direction: column !important; align-items: center !important; text-align: center !important; }
        }

        /* 服务卡片无缝隙修复 */
        .service-block { border: none !important; box-shadow: 0 15px 40px rgba(0,0,0,0.06); background: #fff; flex: 1; min-width: 320px; }
        .service-img-wrap { padding: 0 !important; margin: 0 !important; height: 350px; overflow: hidden; }
        .service-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <section id="hero" style="height:100vh; background:#000; overflow:hidden;">
        <video autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover; filter:brightness(0.8);"><source src="hero-bg.mp4" type="video/mp4"></video>
    </section>

    <section id="intro" style="padding: 100px 20px; background: #0a0a0a; text-align: center; border-bottom: 1px solid #222;">
        <div class="wrap">
            <h2 style="color: #fff;" data-en="The Gulf's Direct Link to <span style='color:#C5A059'>China's Finest</span>" data-ar="بوابتك المباشرة نحو <span style='color:#C5A059'>الفخامة الصينية</span>">The Gulf's Direct Link to China's Finest</h2>
            <p style="color: #888; max-width: 800px; margin: 20px auto;" data-en="Connecting projects with China's premium manufacturers." data-ar="نربط المشاريع المعمارية بنخبة المصنعين في الصين.">Connecting projects with China's premium manufacturers.</p>
        </div>
    </section>

    <section id="services" style="padding: 100px 0; background: #f9f9f9;">
        <div class="wrap" style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div class="service-block">
                <div class="service-img-wrap"><img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200" class="service-img"></div>
                <div style="padding: 30px;"><h3 data-en="Luxury Furniture" data-ar="أثاث فاخر">Luxury Furniture</h3></div>
            </div>
            <div class="service-block">
                <div class="service-img-wrap"><img src="https://images.unsplash.com/photo-1616137466211-f939a420be84?w=1200" class="service-img"></div>
                <div style="padding: 30px;"><h3 data-en="Premium Marble" data-ar="رخام فاخر">Premium Marble</h3></div>
            </div>
        </div>
    </section>

    <footer id="footer" style="background-color: #111; color: #8A8A8A; padding: 80px 0 30px;">
        <div class="wrap" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px;">
            <div><h2 style="color: #C5A059;" data-en="NAQI GULF" data-ar="نقي الخليج">NAQI GULF</h2></div>
            <div>
                <h4 style="color: #C5A059;" data-en="CONTACT" data-ar="اتصل بنا">CONTACT</h4>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="contact-item" style="display:flex; gap:10px;"><span style="color:#C5A059; font-weight:700; width:60px;" data-en="QATAR" data-ar="قطر">QATAR</span><span dir="ltr" style="color:#ddd">+974 3167 1083</span></div>
                    <div class="contact-item" style="display:flex; gap:10px;"><span style="color:#C5A059; font-weight:700; width:60px;" data-en="KSA" data-ar="السعودية">KSA</span><span dir="ltr" style="color:#ddd">+966 51 046 3440</span></div>
                </div>
            </div>
        </div>
        <div dir="ltr" style="text-align: center; border-top: 1px solid #222; margin-top: 60px; padding-top: 30px;">
            <p style="color: #666; font-size: 12px; margin: 0;">© 2026 NAQI GULF CHINESE TRADING AND DECORATION</p>
            <p style="color: #666; font-size: 12px; margin: 10px 0;">شركة نقي الخليج الصيني للتجارة والديكور</p>
        </div>
    </footer>

    <div id="side-rail" style="position: fixed; right: 20px; top: 50%; transform: translateY(-50%);">
        <a href="https://www.instagram.com/naqi_gulf_china_trading" target="_blank">IG</a>
    </div>

    <script>
        function setLang(lang) {
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerHTML = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }
    </script>
</body>
</html>
