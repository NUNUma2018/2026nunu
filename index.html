<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAQI Gulf – Premium Building Materials & Furniture Supply</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        :root { --gold: #C5A059; --ink: #0a0a0a; --cream: #f9f9f9; --font-d: 'Georgia', serif; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; overflow-x: hidden; scroll-behavior: smooth; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        a { text-decoration: none; }
        
        [dir="rtl"] * { letter-spacing: normal !important; }

        /* --- 导航栏：黑金磨砂半透明质感 --- */
        #nav { position: fixed; top: 0; width: 100%; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .nav-inner { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; height: 40px; }
        .nav-brand { cursor: pointer; border: 1px solid rgba(197, 160, 89, 0.4); padding: 5px 15px; transition: 0.3s; }
        .brand-name { font-family: var(--font-d); font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        
        .nav-links { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; align-items: center; }
        .main-link { color: #ddd; font-weight: 600; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .main-link:hover { color: var(--gold); }
        
        .lang-group button { background: none; border: none; cursor: pointer; font-weight: bold; font-size: 13px; padding: 5px; color: #fff; }
        .mobile-toggle { display: none; font-size: 24px; cursor: pointer; color: #fff; background: none; border: none; }

        /* --- 视频模块：默认 16:9 比例 --- */
        #hero { position: relative; width: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-top: 70px; }
        #hero-container { position: relative; width: 100%; aspect-ratio: 16 / 9; }
        #hero video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }

        /* --- 手机端适配：修正视频四方形与 Logo 居中 --- */
        @media (max-width: 900px) {
            #nav { height: 60px; }
            .nav-inner { height: 100%; }
            .nav-brand { position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; }
            .mobile-toggle { display: block; z-index: 11; }
            .lang-group { z-index: 11; }
            .nav-links { display: none; position: absolute; top: 60px; left: 0; width: 100%; background: rgba(10, 10, 10, 0.98); flex-direction: column; padding: 20px 0; }
            .nav-links.active { display: flex; }
            
            #hero { margin-top: 60px !important; }
            #hero-container { width: 100vw !important; aspect-ratio: 16 / 9 !important; height: auto !important; }
        }

        /* --- 侧边栏 --- */
        #side-rail { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; }
        #side-rail a { width: 40px; height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(197, 160, 89, 0.3); color: var(--gold); }
        #side-rail svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- 业务模块 --- */
        #services { background: var(--cream); padding: 80px 0; }
        .services-grid { display: flex; gap: 30px; flex-wrap: wrap; }
        .service-block { flex: 1; min-width: 300px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .service-img-wrap { width: 100%; height: 300px; }
        .service-img { width: 100%; height: 100%; object-fit: cover; }
        .service-text { padding: 30px; }

        #gallery { padding: 80px 0; background: #fff; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 0 20px; }
        .gallery-item { height: 300px; background: #eee; }

        /* --- 页脚 --- */
        #footer { background-color: var(--ink); color: #8A8A8A; padding: 60px 0 30px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 40px; }
        .phone-link { color: #ddd; text-decoration: none; transition: 0.3s; }
        .phone-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="wrap nav-inner">
            <button class="mobile-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-brand" onclick="window.scrollTo(0,0)"><div class="brand-name" data-en="NAQI GULF" data-ar="نقي الخليج">NAQI GULF</div></div>
            <ul class="nav-links" id="mobile-menu">
                <li class="nav-item"><a href="#services" class="main-link" data-en="Products" data-ar="منتجاتنا">Products</a></li>
                <li class="nav-item"><a href="#intro" class="main-link" data-en="About" data-ar="من نحن">About</a></li>
                <li class="nav-item"><a href="#footer" class="main-link" data-en="Contact" data-ar="اتصل بنا">Contact</a></li>
            </ul>
            <div class="lang-group"><button onclick="setLang('en')">EN</button> | <button onclick="setLang('ar')">AR</button></div>
        </div>
    </nav>

    <section id="hero">
        <div id="hero-container">
            <video autoplay muted loop playsinline><source src="hero-bg.mp4" type="video/mp4"></video>
        </div>
    </section>

    <section id="intro" style="padding: 100px 20px; background: #0a0a0a; text-align: center;">
        <div class="wrap">
            <h2 style="color: #fff; font-size: 36px;" data-en="The Gulf's Direct Link to <span style='color:#C5A059'>China's Finest</span>" data-ar="بوابتك المباشرة نحو <span style='color:#C5A059'>الفخامة الصينية</span>">The Gulf's Direct Link to China's Finest</h2>
            <p style="color: #888; line-height: 1.8;" data-en="Premium material supply for Middle East architecture." data-ar="توريد المواد الفاخرة لأرقى المشاريع المعمارية في الشرق الأوسط.">Premium material supply for Middle East architecture.</p>
        </div>
    </section>

    <section id="services">
        <div class="wrap services-grid">
            <div class="service-block">
                <div class="service-img-wrap"><img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800" class="service-img"></div>
                <div class="service-text"><h3 data-en="Luxury Furniture" data-ar="أثاث فاخر">Luxury Furniture</h3></div>
            </div>
            <div class="service-block">
                <div class="service-img-wrap"><img src="https://images.unsplash.com/photo-1616137466211-f939a420be84?w=800" class="service-img"></div>
                <div class="service-text"><h3 data-en="Premium Marble" data-ar="رخام فاخر">Premium Marble</h3></div>
            </div>
        </div>
    </section>

    <section id="gallery">
        <div class="wrap"><h2 data-en="Gallery" data-ar="معرض الصور">Gallery</h2><div class="gallery-grid"><div class="gallery-item"></div><div class="gallery-item"></div><div class="gallery-item"></div></div></div>
    </section>

    <footer id="footer">
        <div class="wrap footer-grid">
            <div><h2 style="color:#fff;" data-en="NAQI GULF" data-ar="نقي الخليج">NAQI GULF</h2></div>
            <div>
                <h4 style="color:var(--gold);" data-en="Contact" data-ar="اتصل بنا">Contact</h4>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <a href="tel:+97431671083" dir="ltr" class="phone-link">QATAR: +974 3167 1083</a>
                    <a href="tel:+966510463440" dir="ltr" class="phone-link">KSA: +966 51 046 3440</a>
                </div>
            </div>
        </div>
        <div style="text-align:center; margin-top:40px; border-top:1px solid #222; padding-top:20px; font-size:12px;">© 2026 NAQI GULF</div>
    </footer>

    <div id="side-rail">
        <a href="https://wa.me/97431671083" target="_blank"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg></a>
    </div>

    <script>
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('active'); }
        function setLang(lang) {
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerHTML = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
            document.getElementById('mobile-menu').classList.remove('active');
        }
    </script>
</body>
</html>
